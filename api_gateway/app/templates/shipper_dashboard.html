<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipper Dashboard - MicroBookstore</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="text-2xl bg-orange-500 text-slate-900 p-2 rounded-xl font-black shadow-lg shadow-orange-500/20">SHIPPER</span>
                <h1 class="text-xl font-heading font-black tracking-tight text-white">Delivery Hub</h1>
            </div>
            <div class="flex items-center gap-6">
                <span class="text-sm font-bold text-slate-400" id="shipper-name">Hello, Driver</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10 flex gap-8">
        <!-- Sidebar -->
        <aside class="w-64 flex-shrink-0">
            <nav class="sticky top-24 space-y-2">
                <button onclick="switchSection('available')" id="nav-available"
                    class="w-full flex items-center gap-3 px-6 py-4 rounded-2xl bg-orange-500 text-slate-900 font-black shadow-lg shadow-orange-500/20 transition-all border-2 border-transparent">
                    <span class="text-xl">📫</span>
                    <span>Available Orders</span>
                </button>
                <button onclick="switchSection('active')" id="nav-active"
                    class="w-full flex items-center gap-3 px-6 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700 transition-all border-2 border-transparent">
                    <span class="text-xl">🚚</span>
                    <span>My Deliveries</span>
                </button>
            </nav>
        </aside>

        <!-- Content Area -->
        <div class="flex-1 min-w-0">
            <!-- SECTION: AVAILABLE SHIPMENTS -->
            <div id="section-available" class="space-y-10">
                <section class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-xl">
                    <div class="px-8 py-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                        <h2 class="text-2xl font-heading font-bold text-orange-400">📫 Available for Pickup</h2>
                        <button onclick="fetchShipments('available')" class="text-orange-400 hover:text-white font-bold text-sm">🔄 Refresh List</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-slate-700/30 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                                    <th class="px-6 py-4 text-left">Tracking</th>
                                    <th class="px-6 py-4 text-left">Order #</th>
                                    <th class="px-6 py-4 text-left">Address</th>
                                    <th class="px-6 py-4 text-left">Created</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="available-tbody" class="divide-y divide-slate-700/50">
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <!-- SECTION: ACTIVE SHIPMENTS -->
            <div id="section-active" class="hidden space-y-10">
                <section class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-xl">
                    <div class="px-8 py-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                        <h2 class="text-2xl font-heading font-bold text-emerald-400">🚚 My Deliveries (In Transit)</h2>
                        <div class="flex items-center gap-3">
                            <label for="shipperTimeFilter" class="text-sm font-bold text-slate-400">Time:</label>
                            <select id="shipperTimeFilter" onchange="fetchShipments('active')" class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm font-medium text-slate-200 focus:border-emerald-500 outline-none">
                                <option value="">All Time</option>
                                <option value="1">Last 24 Hours</option>
                                <option value="7">Last 7 Days</option>
                                <option value="30">Last 30 Days</option>
                            </select>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-slate-700/30 text-slate-500 text-[10px] uppercase font-black tracking-widest">
                                    <th class="px-6 py-4 text-left">Tracking</th>
                                    <th class="px-6 py-4 text-left">Order #</th>
                                    <th class="px-6 py-4 text-left">Address</th>
                                    <th class="px-6 py-4 text-left">Status</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="active-tbody" class="divide-y divide-slate-700/50">
                                <!-- Loaded via JS -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchShipments('available');
        });

        function switchSection(section) {
            document.getElementById('section-available').classList.add('hidden');
            document.getElementById('section-active').classList.add('hidden');
            
            document.getElementById('section-' + section).classList.remove('hidden');
            
            // UI Nav Update
            const navAvailable = document.getElementById('nav-available');
            const navActive = document.getElementById('nav-active');
            
            const inactiveNav = "w-full flex items-center gap-3 px-6 py-4 rounded-2xl bg-slate-800 text-slate-400 font-bold hover:bg-slate-700 transition-all border-2 border-transparent";
            
            navAvailable.className = inactiveNav;
            navActive.className = inactiveNav;
            
            if (section === 'available') {
                navAvailable.className = "w-full flex items-center gap-3 px-6 py-4 rounded-2xl bg-orange-500 text-slate-900 font-black shadow-lg shadow-orange-500/20 transition-all border-2 border-transparent";
                fetchShipments('available');
            } else if (section === 'active') {
                navActive.className = "w-full flex items-center gap-3 px-6 py-4 rounded-2xl bg-emerald-500 text-white font-black shadow-lg shadow-emerald-500/20 transition-all border-2 border-transparent";
                fetchShipments('active');
            }
        }

        async function fetchShipments(type) {
            try {
                const days = document.getElementById('shipperTimeFilter').value;
                const url = type === 'available' ? '/api/shipper/shipments/available/' : `/api/shipper/shipments/active/?days=${days}`;
                const res = await fetch(url);
                const shipments = await res.json();
                
                const tbodyId = type === 'available' ? 'available-tbody' : 'active-tbody';
                const tbody = document.getElementById(tbodyId);
                tbody.innerHTML = '';
                
                shipments.forEach(s => {
                    let actions = '';
                    let statusBadge = '';
                    
                    if (s.status === 'ready_for_pickup') {
                        statusBadge = `<span class="bg-slate-700 text-slate-300 px-3 py-1 rounded-full text-xs font-bold">Waiting</span>`;
                        actions = `<button onclick="updateStatus(${s.id}, 'delivering')" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-4 rounded-xl shadow focus:outline-none transition-colors">📦 Accept Delivery</button>`;
                    } else if (s.status === 'delivering') {
                        statusBadge = `<span class="bg-orange-900/50 text-orange-400 border border-orange-700 px-3 py-1 rounded-full text-xs font-bold">In Transit</span>`;
                        actions = `
                            <div class="flex justify-end gap-2">
                                <button onclick="updateStatus(${s.id}, 'completed')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-4 rounded-xl shadow focus:outline-none transition-colors">✅ Complete</button>
                                <button onclick="updateStatus(${s.id}, 'cancelled')" class="bg-red-900/80 hover:bg-red-600 text-red-200 font-bold py-2 px-4 rounded-xl shadow focus:outline-none transition-colors">❌ Cancel</button>
                            </div>
                        `;
                    }

                    const dateStr = new Date(s.created_at).toLocaleString();
                    const row = `
                        <tr class="hover:bg-slate-700/20 transition-colors">
                            <td class="px-6 py-4 font-mono font-bold text-orange-400">${s.tracking_code}</td>
                            <td class="px-6 py-4 text-slate-300 font-bold">#${s.order_id}</td>
                            <td class="px-6 py-4 text-slate-400">${s.address}</td>
                            <td class="px-6 py-4">${type === 'active' ? statusBadge : dateStr}</td>
                            <td class="px-6 py-4 text-right flex justify-end items-center gap-2">
                                <button onclick="viewOrderDetails(${s.order_id})" class="text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-2 rounded-xl transition-all font-black uppercase tracking-widest">👁️ View</button>
                                ${actions}
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
                
                if (shipments.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-12 text-center text-slate-500 italic">No shipments found.</td></tr>`;
                }
            } catch (e) { console.error("Error fetching shipments:", e); }
        }

        async function updateStatus(shipmentId, newStatus) {
            if (!confirm(`Are you sure you want to change shipment status to ${newStatus}?`)) return;
            const csrfToken = document.cookie.split('; ').find(r => r.startsWith('csrftoken='))?.split('=')[1] || '';
            
            try {
                const res = await fetch(`/api/shipper/shipments/${shipmentId}/status/`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (res.ok) {
                    showToast(`Shipment updated successfully!`);
                    // Refresh current section
                    const isAvailable = !document.getElementById('section-available').classList.contains('hidden');
                    fetchShipments(isAvailable ? 'available' : 'active');
                } else {
                    const data = await res.json();
                    alert('Error: ' + JSON.stringify(data));
                }
            } catch (e) { alert('Error updating status.'); }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-10 right-10 bg-emerald-600 text-white font-black px-8 py-4 rounded-3xl shadow-2xl z-50 animate-bounce-slow border-2 border-emerald-400/30';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
    <style>
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    </style>
    {% include "components/order_modal.html" %}
</body>
</html>
