<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Shop - MicroBookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=Rubik:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito Sans', 'sans-serif'], heading: ['Rubik', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">
    <!-- Navbar (Minimal) -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-indigo-600 flex items-center gap-2">
                <span class="bg-indigo-600 text-white p-2 rounded-xl text-xs">MB</span>
                MicroBookstore
            </a>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Your Points</p>
                    <p id="points-display" class="text-xl font-black text-indigo-600">--- pts</p>
                </div>
                <a href="/profile/" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center hover:bg-slate-200 transition-colors">👤</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-heading font-black text-slate-900 mb-4">🎟️ Voucher Shop</h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-lg">Exchange your hard-earned points for exclusive discounts and rewards. New deals added every week!</p>
        </header>

        <!-- Voucher Grid -->
        <div id="voucher-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading state -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
                <p class="text-slate-400 font-bold uppercase tracking-widest">Loading Rewards...</p>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-6">🎉</div>
            <h3 class="text-2xl font-black text-slate-900 mb-2">Redeemed!</h3>
            <p class="text-slate-500 mb-8">The voucher has been added to your account. You can apply it at checkout.</p>
            <button onclick="document.getElementById('successModal').classList.add('hidden')" 
                class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-indigo-600 transition-colors shadow-lg shadow-indigo-500/20">
                Awesome!
            </button>
        </div>
    </div>

    <script>
        let userPoints = 0;
        let userLevelId = null;
        let membershipLevels = [];

        async function init() {
            await fetchMembershipLevels();
            await fetchProfile();
            await fetchVouchers();
        }

        async function fetchMembershipLevels() {
            try {
                const res = await fetch('/api/membership-levels/');
                membershipLevels = await res.json();
            } catch (e) { console.error("Error fetching levels:", e); }
        }

        async function fetchProfile() {
            try {
                const res = await fetch('/api/loyalty/wallet/');
                const data = await res.json();
                userPoints = data.usable_points;
                userLevelId = data.current_level ? data.current_level.id : null;
                document.getElementById('points-display').textContent = `${userPoints.toLocaleString()} pts`;
            } catch (e) {
                console.error("Error fetching wallet:", e);
            }
        }

        async function fetchVouchers() {
            try {
                const res = await fetch('/api/vouchers/');
                const vouchers = await res.json();
                
                const grid = document.getElementById('voucher-grid');
                grid.innerHTML = '';
                
                if (vouchers.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400 font-bold">No vouchers available right now. Check back later!</p>';
                    return;
                }

                vouchers.forEach(v => {
                    const canAfford = userPoints >= v.point_cost;
                    const hasRequiredLevel = !v.min_points_level_id || (userLevelId && userLevelId >= v.min_points_level_id);
                    const isEligible = canAfford && hasRequiredLevel;

                    const discountValue = v.is_percentage ? `${v.discount_amount}%` : `$${v.discount_amount}`;
                    const tierReq = v.min_points_level_id 
                        ? membershipLevels.find(l => l.id == v.min_points_level_id)
                        : null;

                    const tierBadge = tierReq 
                        ? `<div class="mt-2 text-[10px] font-black uppercase tracking-widest ${hasRequiredLevel ? 'text-emerald-500' : 'text-red-500'} flex items-center gap-1">
                             ${hasRequiredLevel ? '✅' : '🔒'} Required: ${tierReq.name}
                           </div>`
                        : '';

                    const card = `
                        <div class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm hover:shadow-2xl transition-all group flex flex-col h-full overflow-hidden relative ${!hasRequiredLevel ? 'opacity-75 grayscale-[0.5]' : ''}">
                            <!-- Dash border design -->
                            <div class="absolute -right-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-slate-50 rounded-full border border-slate-200"></div>
                            <div class="absolute -left-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-slate-50 rounded-full border border-slate-200"></div>
                            
                            <div class="mb-6 flex justify-between items-start">
                                <div>
                                    <div class="bg-indigo-100 text-indigo-700 font-black px-4 py-1.5 rounded-full text-xs inline-block">
                                        ${discountValue} OFF
                                    </div>
                                    ${tierBadge}
                                </div>
                                <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest">#${v.code}</span>
                            </div>
                            
                            <div class="flex-1 mb-8">
                                <h2 class="text-2xl font-black text-slate-900 mb-2">${discountValue} Store Voucher</h2>
                                <p class="text-slate-500 text-sm">Requires minimum spend of <strong>$${v.min_spend}</strong>. Valid for all books in catalog.</p>
                            </div>
                            
                            <div class="border-t border-slate-100 pt-6 mt-auto flex items-center justify-between gap-4">
                                <div class="text-indigo-600 font-black">
                                    <span class="text-2xl">${v.point_cost}</span>
                                    <span class="text-xs uppercase">points</span>
                                </div>
                                <button onclick="redeemVoucher(${v.id}, ${v.point_cost})" 
                                    ${!isEligible ? 'disabled' : ''}
                                    class="px-6 py-3 rounded-2xl font-black text-sm transition-all shadow-lg 
                                    ${isEligible ? 'bg-slate-900 text-white hover:bg-indigo-600 shadow-indigo-500/20 active:scale-95 cursor-pointer' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}">
                                    ${!hasRequiredLevel ? 'Level Too Low' : (canAfford ? 'Redeem Now' : 'Not Enough Points')}
                                </button>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', card);
                });
            } catch (e) {
                console.error("Error fetching vouchers:", e);
                document.getElementById('voucher-grid').innerHTML = '<p class="col-span-full text-center py-20 text-red-400 font-bold">Failed to load vouchers. Try again.</p>';
            }
        }

        async function redeemVoucher(vid, cost) {
            const csrfToken = document.cookie.split('; ').find(r => r.startsWith('csrftoken=')).split('=')[1];
            if (!confirm(`Redeem this voucher for ${cost} points?`)) return;
            
            try {
                const res = await fetch('/api/vouchers/redeem/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ voucher_id: vid })
                });
                
                if (res.ok) {
                    document.getElementById('successModal').classList.remove('hidden');
                    init(); // Refresh points and vouchers
                } else {
                    const data = await res.json();
                    alert(data.error || 'Redemption failed.');
                }
            } catch (e) {
                alert("Error connecting to server.");
            }
        }

        init();
    </script>
</body>
</html>
