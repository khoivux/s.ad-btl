<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBookstore - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4F46E5', secondary: '#F59E0B' },
                    fontFamily: { sans: ['Nunito Sans', 'sans-serif'], heading: ['Rubik', 'sans-serif'] }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;500;600;700&family=Rubik:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-3xl border-4 border-gray-100 shadow-[8px_8px_0px_#e2e8f0] w-full max-w-md">
        <h2 class="text-4xl font-heading font-black text-center mb-2">Join Us</h2>
        <p class="text-center text-slate-500 font-medium mb-8">Create an account to start shopping.</p>

        {% if error %}
        <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 font-bold border border-red-200">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="mb-5">
                <label class="block text-slate-700 font-bold mb-2">Display Name</label>
                <input type="text" name="name" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:outline-none transition-colors">
            </div>
            <div class="mb-5">
                <label class="block text-slate-700 font-bold mb-2">Email</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:outline-none transition-colors">
            </div>
            <div class="mb-5">
                <label class="block text-slate-700 font-bold mb-2">Phone Number</label>
                <input type="tel" name="phone_number"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:outline-none transition-colors">
            </div>
            <div class="mb-8">
                <label class="block text-slate-700 font-bold mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary focus:outline-none transition-colors">
            </div>
            <button type="submit"
                class="w-full bg-secondary hover:bg-amber-600 text-white font-bold py-4 rounded-xl transition-transform hover:-translate-y-1 shadow-[4px_4px_0px_#78350f] hover:shadow-[6px_6px_0px_#78350f] active:translate-y-0 active:shadow-none mb-6">
                Create Account
            </button>
        </form>
        <p class="text-center text-slate-500 font-bold">Already have an account? <a href="{% url 'login' %}"
                class="text-primary hover:underline">Log in</a></p>
    </div>
</body>

</html>
