<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - MicroBookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;600;700&family=Rubik:wght@700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
{% include 'navbar.html' %}

<div class="max-w-4xl mx-auto px-4 py-12 text-center">
    <div class="mb-8">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-green-100 rounded-full mb-6">
            <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-4xl font-black text-slate-800 mb-2">Order Placed Successfully!</h1>
        <p class="text-lg text-slate-600">Thank you for your purchase, {{ customer_name }}!</p>
    </div>

    <div class="bg-white border-2 border-slate-100 rounded-3xl p-8 shadow-sm mb-8 inline-block min-w-[300px]">
        <div class="text-sm text-slate-500 uppercase tracking-widest font-bold mb-1">Order Number</div>
        <div class="text-2xl font-black text-indigo-600 mb-4">#{{ order_id }}</div>
        <p class="text-slate-500 text-sm mb-6">We've sent a confirmation email with all the details.</p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/orders/{{ order_id }}/detail/" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg hover:shadow-indigo-200">
                View Order Details
            </a>
            <a href="/orders/{{ order_id }}/tracking/" class="bg-indigo-50 text-indigo-600 px-8 py-4 rounded-2xl font-bold hover:bg-indigo-100 transition-all">
                Track Shipment
            </a>
        </div>
    </div>

    <div>
        <a href="/" class="text-slate-500 font-bold hover:text-indigo-600 transition-all flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Continue Shopping
        </a>
    </div>
</div>

</body>
</html>
