<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBookstore - Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0F172A', accent: '#F59E0B' },
                    fontFamily: { sans: ['Nunito Sans', 'sans-serif'], heading: ['Rubik', 'sans-serif'] }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;500;600;700&family=Rubik:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-slate-800 p-10 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <span
                class="inline-block bg-amber-500 text-slate-900 font-black px-4 py-1 rounded-full text-sm mb-4 uppercase tracking-widest">Staff
                Portal</span>
            <h2 class="text-4xl font-heading font-black text-white">Admin Access</h2>
            <p class="text-slate-400 mt-2">Manage books and inventory</p>
        </div>

        {% if error %}
        <div class="bg-red-900/50 text-red-300 p-4 rounded-xl mb-6 font-bold border border-red-700">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'staff_login' %}">
            {% csrf_token %}
            {% csrf_token %}
            <div class="mb-5">
                <label class="block text-slate-300 font-bold mb-2">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-700 border-2 border-slate-600 text-white focus:border-amber-500 focus:outline-none transition-colors placeholder-slate-500"
                    placeholder="Enter username">
            </div>
            <div class="mb-8">
                <label class="block text-slate-300 font-bold mb-2">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-700 border-2 border-slate-600 text-white focus:border-amber-500 focus:outline-none transition-colors placeholder-slate-500"
                    placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-4 rounded-xl transition-all hover:-translate-y-1 shadow-lg active:translate-y-0">
                Login to Staff Portal
            </button>
        </form>
        <p class="text-center text-slate-500 mt-6 text-sm"><a href="/books/"
                class="hover:text-amber-400 transition-colors">← Back to Store</a></p>
    </div>
</body>

</html>
