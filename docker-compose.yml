version: '3.8'

services:
  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    volumes:
      - ./customer-service:/app

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    volumes:
      - ./book-service:/app

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    volumes:
      - ./staff-service:/app

  order-service:
    build: ./order-service
    ports:
      - "8005:8000"
    volumes:
      - ./order-service:/app

  pay-service:
    build: ./pay-service
    ports:
      - "8006:8000"
    volumes:
      - ./pay-service:/app

  ship-service:
    build: ./ship-service
    ports:
      - "8007:8000"
    volumes:
      - ./ship-service:/app

  comment-rate-service:
